name: reusable-promote

# Shared workflow: verify an already-staged artifact and open a production GitOps PR.

on:
  workflow_call:
    inputs:
      service-name:
        type: string
        required: true
      container-name:
        type: string
        required: true
      gitops-app-path:
        description: GitOps app path, for example apps/worlddatetime.
        type: string
        required: true
      staging-overlay:
        type: string
        default: stage
      production-overlay:
        type: string
        default: prod
      production-environment:
        type: string
        default: production
      image-tag:
        type: string
        required: true
      image-digest:
        type: string
        required: true
      cosign-certificate-identity:
        description: Optional expected keyless Cosign certificate identity.
        type: string
        default: ""
      cosign-certificate-identity-regexp:
        description: Optional expected keyless Cosign certificate identity regexp. Used when cosign-certificate-identity is empty.
        type: string
        default: '^https://github\.com/sverma/platform-workflows/\.github/workflows/reusable-build-sign\.yaml@refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$'
      attestation-repo:
        description: Repository that owns GitHub artifact attestations. Defaults to the caller repository.
        type: string
        default: ""
      signer-workflow:
        description: Expected reusable build/sign workflow identity for GitHub attestation verification.
        type: string
        default: github.com/sverma/platform-workflows/.github/workflows/reusable-build-sign.yaml
      gitops-kubernetes-version:
        description: Kubernetes version used for GitOps schema validation.
        type: string
        default: "1.30.0"
      gitops-kustomize-version:
        description: Kustomize version used for GitOps rendering.
        type: string
        default: "v5.4.3"
      gitops-kubeconform-version:
        description: kubeconform version used for GitOps schema validation.
        type: string
        default: "v0.6.7"
      gitops-policy-paths:
        description: Newline-separated Conftest policy paths in the checked-out GitOps repo. Empty disables policy checks.
        type: string
        default: policies/conftest/kubernetes
      gitops-policy-mode:
        description: GitOps policy mode. Use enforce, audit, or skip.
        type: string
        default: enforce
    secrets:
      WORKLOAD_IDENTITY_PROVIDER:
        required: true
      GCP_SERVICE_ACCOUNT:
        required: true
      GCP_REGION:
        required: true
      GITOPS_REPO:
        required: true
      GITOPS_PAT:
        required: true

permissions:
  contents: read
  id-token: write
  attestations: read

concurrency:
  group: promote-production-${{ inputs.service-name }}
  cancel-in-progress: false

jobs:
  open-promotion-pr:
    name: open-promotion-pr
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.production-environment }}
    steps:
      - name: Validate promotion inputs
        env:
          IMAGE_TAG: ${{ inputs.image-tag }}
          IMAGE_DIGEST: ${{ inputs.image-digest }}
        run: |
          ruby <<'RUBY'
          tag = ENV.fetch("IMAGE_TAG")
          digest = ENV.fetch("IMAGE_DIGEST")

          unless tag.match?(/\A[\w][\w.-]{0,127}\z/)
            abort "::error::image-tag must be a valid Docker tag"
          end

          unless digest.match?(/\Asha256:[0-9a-f]{64}\z/)
            abort "::error::image-digest must be a lowercase sha256 digest"
          end

          puts "Promotion inputs are well-formed."
          RUBY

      - name: Checkout GitOps repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ secrets.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}

      - name: Verify requested image is already staged
        id: staging-image
        env:
          CONTAINER_NAME: ${{ inputs.container-name }}
          IMAGE_TAG: ${{ inputs.image-tag }}
          IMAGE_DIGEST: ${{ inputs.image-digest }}
          STAGING_IMAGE_PATH: ${{ inputs.gitops-app-path }}/overlays/${{ inputs.staging-overlay }}/image.yaml
        run: |
          ruby <<'RUBY'
          require "yaml"

          path = ENV.fetch("STAGING_IMAGE_PATH")
          container_name = ENV.fetch("CONTAINER_NAME")
          tag = ENV.fetch("IMAGE_TAG")
          digest = ENV.fetch("IMAGE_DIGEST")
          expected_suffix = ":#{tag}@#{digest}"
          doc = YAML.load_file(path)

          unless doc.is_a?(Hash) && doc["kind"] == "Deployment"
            abort "::error::#{path} must be a Deployment patch"
          end

          containers = doc.dig("spec", "template", "spec", "containers")
          unless containers.is_a?(Array)
            abort "::error::#{path} must define spec.template.spec.containers"
          end

          container = containers.find { |candidate| candidate.is_a?(Hash) && candidate["name"] == container_name }
          unless container
            abort "::error::#{path} does not define container #{container_name.inspect}"
          end

          image = container["image"]
          unless image.is_a?(String) && image.end_with?(expected_suffix)
            abort "::error::Requested #{expected_suffix} is not the staged #{container_name} image; found #{image.inspect}"
          end

          before_digest, actual_digest = image.split("@", 2)
          unless actual_digest == digest
            abort "::error::Staged image digest mismatch; expected #{digest.inspect}, found #{actual_digest.inspect}"
          end

          last_slash = before_digest.rindex("/") || -1
          tag_separator = before_digest.rindex(":")
          unless tag_separator && tag_separator > last_slash
            abort "::error::Staged image must include a tag before the digest; found #{image.inspect}"
          end

          repository = before_digest[0...tag_separator]
          if repository.nil? || repository.empty?
            abort "::error::Staged image repository is empty; found #{image.inspect}. Re-run release with platform-workflows v1.0.7 or newer."
          end

          unless repository.match?(/\A[^:\/\s]+(?:\/[^:\/\s]+)+\z/)
            abort "::error::Staged image repository is malformed: #{repository.inspect}"
          end

          digest_ref = "#{repository}@#{digest}"

          File.open(ENV.fetch("GITHUB_OUTPUT"), "a") do |output|
            output.puts "image=#{image}"
            output.puts "digest_ref=#{digest_ref}"
          end

          puts "Verified staged image: #{image}"
          puts "Canonical digest reference: #{digest_ref}"
          RUBY

      - name: Authenticate to GCP (OIDC, no static keys)
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Verify staged image exists in registry
        env:
          IMAGE_REF: ${{ steps.staging-image.outputs.digest_ref }}
        run: docker buildx imagetools inspect "$IMAGE_REF"

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Verify staged image signature
        env:
          IMAGE_REF: ${{ steps.staging-image.outputs.digest_ref }}
          COSIGN_CERTIFICATE_IDENTITY: ${{ inputs.cosign-certificate-identity }}
          COSIGN_CERTIFICATE_IDENTITY_REGEXP: ${{ inputs.cosign-certificate-identity-regexp }}
        run: |
          if [ -n "$COSIGN_CERTIFICATE_IDENTITY" ]; then
            cosign verify \
              --certificate-identity "$COSIGN_CERTIFICATE_IDENTITY" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$IMAGE_REF"
          else
            cosign verify \
              --certificate-identity-regexp "$COSIGN_CERTIFICATE_IDENTITY_REGEXP" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$IMAGE_REF"
          fi

      - name: Verify staged image provenance attestation
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_REF: ${{ steps.staging-image.outputs.digest_ref }}
          ATTESTATION_REPO: ${{ inputs.attestation-repo != '' && inputs.attestation-repo || github.repository }}
          SIGNER_WORKFLOW: ${{ inputs.signer-workflow }}
        run: |
          gh attestation verify "oci://$IMAGE_REF" \
            --repo "$ATTESTATION_REPO" \
            --signer-workflow "$SIGNER_WORKFLOW" \
            --source-ref refs/heads/main

      - name: Pin image (tag + digest) in production overlay
        working-directory: ${{ inputs.gitops-app-path }}/overlays/${{ inputs.production-overlay }}
        env:
          CONTAINER_NAME: ${{ inputs.container-name }}
          NEW_IMAGE: ${{ steps.staging-image.outputs.image }}
        run: |
          ruby <<'RUBY'
          require "yaml"

          path = "image.yaml"
          container_name = ENV.fetch("CONTAINER_NAME")
          new_image = ENV.fetch("NEW_IMAGE")
          doc = YAML.load_file(path)

          unless doc.is_a?(Hash) && doc["kind"] == "Deployment"
            abort "::error::#{path} must be a Deployment patch"
          end

          containers = doc.dig("spec", "template", "spec", "containers")
          unless containers.is_a?(Array)
            abort "::error::#{path} must define spec.template.spec.containers"
          end

          container = containers.find { |candidate| candidate.is_a?(Hash) && candidate["name"] == container_name }
          unless container
            abort "::error::#{path} does not define container #{container_name.inspect}"
          end

          previous_image = container["image"]
          container["image"] = new_image
          File.write(path, YAML.dump(doc))

          puts "Pinned production #{container_name} image:"
          puts "  from: #{previous_image}"
          puts "  to:   #{new_image}"
          RUBY

      - name: Validate production GitOps overlay
        uses: sverma/platform-workflows/.github/actions/gitops-validate@codex/gitops-policy-pass2
        with:
          overlays: ${{ inputs.gitops-app-path }}/overlays/${{ inputs.production-overlay }}
          kubernetes-version: ${{ inputs.gitops-kubernetes-version }}
          kustomize-version: ${{ inputs.gitops-kustomize-version }}
          kubeconform-version: ${{ inputs.gitops-kubeconform-version }}
          policy-paths: ${{ inputs.gitops-policy-paths }}
          policy-mode: ${{ inputs.gitops-policy-mode }}

      - name: Open promotion pull request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ secrets.GITOPS_PAT }}
          branch: promote/${{ inputs.service-name }}-${{ inputs.image-tag }}
          delete-branch: true
          title: "Promote ${{ inputs.service-name }} ${{ inputs.image-tag }} to production"
          commit-message: "cd(${{ inputs.service-name }}): promote ${{ inputs.image-tag }} to production"
          body: |
            Promotes the already-staged, signed image to production.

            - **Service:** `${{ inputs.service-name }}`
            - **Tag:** `${{ inputs.image-tag }}`
            - **Digest:** `${{ inputs.image-digest }}`

            The image is unchanged from staging (same digest). Merging this PR lets
            Argo CD reconcile the production overlay.
