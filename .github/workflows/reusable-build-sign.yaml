name: reusable-build-sign

# Shared workflow: turn source into a trusted, immutable container artifact.

on:
  workflow_call:
    inputs:
      push:
        description: Push, scan and sign the image.
        type: boolean
        default: false
      image-name:
        description: Container image name inside the Artifact Registry repository.
        type: string
        required: true
      image-tag:
        description: Tag to apply to the image.
        type: string
        required: true
      build-context:
        description: Docker build context.
        type: string
        default: "."
      dockerfile:
        description: Dockerfile path.
        type: string
        default: "Dockerfile"
    secrets:
      WORKLOAD_IDENTITY_PROVIDER:
        required: false
      GCP_SERVICE_ACCOUNT:
        required: false
      GCP_REGION:
        required: false
      GCP_PROJECT_ID:
        required: false
      GAR_REPOSITORY:
        required: false
    outputs:
      image:
        description: Fully-qualified image repository without tag.
        value: ${{ jobs.build.outputs.image }}
      digest:
        description: Immutable image digest.
        value: ${{ jobs.build.outputs.digest }}

permissions:
  contents: read

jobs:
  build:
    name: build / scan / sign
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Authenticate to GCP (OIDC, no static keys)
        if: ${{ inputs.push }}
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        if: ${{ inputs.push }}
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Configure Docker auth for Artifact Registry
        if: ${{ inputs.push }}
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Docker login for OCI registry clients
        if: ${{ inputs.push }}
        run: |
          gcloud auth print-access-token \
            | docker login \
                -u oauth2accesstoken \
                --password-stdin \
                https://${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Compute image reference
        id: meta
        run: |
          if [ "${{ inputs.push }}" = "true" ]; then
            echo "image=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}/${{ inputs.image-name }}" >> "$GITHUB_OUTPUT"
          else
            echo "image=${{ inputs.image-name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build (and push on release)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.push }}
          load: ${{ !inputs.push }}
          tags: ${{ steps.meta.outputs.image }}:${{ inputs.image-tag }}
          provenance: ${{ inputs.push && 'mode=max' || 'false' }}
          sbom: ${{ inputs.push }}

      - name: Registry credentials for Trivy
        if: ${{ inputs.push }}
        run: |
          echo "TRIVY_USERNAME=oauth2accesstoken" >> "$GITHUB_ENV"
          echo "TRIVY_PASSWORD=$(gcloud auth print-access-token)" >> "$GITHUB_ENV"

      - name: Trivy image scan (blocking on CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ inputs.push && format('{0}@{1}', steps.meta.outputs.image, steps.build.outputs.digest) || format('{0}:{1}', steps.meta.outputs.image, inputs.image-tag) }}
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Install Cosign
        if: ${{ inputs.push }}
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Cosign sign image (keyless / Sigstore)
        if: ${{ inputs.push }}
        run: cosign sign --yes "${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: Attest SLSA build provenance
        if: ${{ inputs.push }}
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-name: ${{ steps.meta.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
