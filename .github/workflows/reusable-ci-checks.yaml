name: reusable-ci-checks

# Shared workflow: source-level quality + security gates for Go services.

on:
  workflow_call:
    inputs:
      go-version:
        description: Go toolchain version
        type: string
        default: "1.24"

permissions:
  contents: read

jobs:
  test:
    name: lint / vet / test / vuln
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify module checksums
        run: go mod verify

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt-ed:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8
        with:
          version: latest

      - name: Unit tests (race detector + coverage)
        run: go test ./... -race -covermode=atomic -coverprofile=coverage.out

      - name: govulncheck (Go-aware CVE detection)
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  security:
    name: SAST / secrets / dependency scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Trivy filesystem scan (deps + IaC, blocking)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Semgrep SAST (report-only)
        continue-on-error: true
        run: |
          python3 -m pip install --quiet semgrep
          semgrep scan --config auto --sarif --output semgrep.sarif

      - name: Upload Semgrep SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }} # required only for private repos in a GitHub org
