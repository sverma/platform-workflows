name: reusable-release

# Shared workflow: CI, build/sign once, then deploy the signed artifact to staging via GitOps.

on:
  workflow_call:
    inputs:
      service-name:
        type: string
        required: true
      image-name:
        type: string
        required: true
      container-name:
        type: string
        required: true
      gitops-app-path:
        description: GitOps app path, for example apps/worlddatetime.
        type: string
        required: true
      staging-overlay:
        type: string
        default: stage
      staging-environment:
        type: string
        default: staging
      go-version:
        type: string
        default: "1.24"
      build-context:
        type: string
        default: "."
      dockerfile:
        type: string
        default: "Dockerfile"
    secrets:
      WORKLOAD_IDENTITY_PROVIDER:
        required: true
      GCP_SERVICE_ACCOUNT:
        required: true
      GCP_REGION:
        required: true
      GCP_PROJECT_ID:
        required: true
      GAR_REPOSITORY:
        required: true
      GITOPS_REPO:
        required: true
      GITOPS_PAT:
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci-checks:
    name: ci-checks
    uses: ./.github/workflows/reusable-ci-checks.yaml
    permissions:
      contents: read
      security-events: write
    with:
      go-version: ${{ inputs.go-version }}

  version:
    name: compute-version
    runs-on: ubuntu-latest
    needs: ci-checks
    outputs:
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Compute version tag
        id: v
        run: |
          short="$(git rev-parse --short=7 HEAD)"
          base="$(git describe --tags --abbrev=0 2>/dev/null || echo v0.0.0)"
          echo "tag=${base}-${short}" >> "$GITHUB_OUTPUT"

  build-sign:
    name: build-sign
    needs: version
    uses: ./.github/workflows/reusable-build-sign.yaml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      push: true
      image-name: ${{ inputs.image-name }}
      image-tag: ${{ needs.version.outputs.tag }}
      build-context: ${{ inputs.build-context }}
      dockerfile: ${{ inputs.dockerfile }}
    secrets:
      WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}

  deploy-staging:
    name: deploy-staging
    needs: [version, build-sign]
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.staging-environment }}
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ secrets.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}

      - name: Pin new image (tag + digest) in staging overlay
        working-directory: ${{ inputs.gitops-app-path }}/overlays/${{ inputs.staging-overlay }}
        env:
          CONTAINER_NAME: ${{ inputs.container-name }}
          NEW_IMAGE: ${{ needs.build-sign.outputs.image }}:${{ needs.version.outputs.tag }}@${{ needs.build-sign.outputs.digest }}
        run: |
          ruby <<'RUBY'
          require "yaml"

          path = "image.yaml"
          container_name = ENV.fetch("CONTAINER_NAME")
          new_image = ENV.fetch("NEW_IMAGE")
          doc = YAML.load_file(path)

          unless doc.is_a?(Hash) && doc["kind"] == "Deployment"
            abort "::error::#{path} must be a Deployment patch"
          end

          containers = doc.dig("spec", "template", "spec", "containers")
          unless containers.is_a?(Array)
            abort "::error::#{path} must define spec.template.spec.containers"
          end

          container = containers.find { |candidate| candidate.is_a?(Hash) && candidate["name"] == container_name }
          unless container
            abort "::error::#{path} does not define container #{container_name.inspect}"
          end

          previous_image = container["image"]
          container["image"] = new_image
          File.write(path, YAML.dump(doc))

          puts "Pinned staging #{container_name} image:"
          puts "  from: #{previous_image}"
          puts "  to:   #{new_image}"
          RUBY

      - name: Verify staging image pin
        working-directory: ${{ inputs.gitops-app-path }}/overlays/${{ inputs.staging-overlay }}
        env:
          CONTAINER_NAME: ${{ inputs.container-name }}
          EXPECTED_IMAGE: ${{ needs.build-sign.outputs.image }}:${{ needs.version.outputs.tag }}@${{ needs.build-sign.outputs.digest }}
        run: |
          ruby <<'RUBY'
          require "yaml"

          path = "image.yaml"
          container_name = ENV.fetch("CONTAINER_NAME")
          expected_image = ENV.fetch("EXPECTED_IMAGE")
          doc = YAML.load_file(path)
          containers = doc.dig("spec", "template", "spec", "containers")
          image = containers&.find { |candidate| candidate.is_a?(Hash) && candidate["name"] == container_name }&.fetch("image", nil)

          unless image == expected_image
            abort "::error::Expected #{container_name} image #{expected_image.inspect}, found #{image.inspect}"
          end

          puts "Verified staging #{container_name} image is #{image}"
          RUBY

      - name: Commit and push
        env:
          SERVICE_NAME: ${{ inputs.service-name }}
          IMAGE_TAG: ${{ needs.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No image change to commit."
            exit 0
          fi
          git commit -m "ci(${SERVICE_NAME}): deploy ${IMAGE_TAG} to staging"
          git push

  summary:
    name: promotion-instructions
    needs: [version, build-sign, deploy-staging]
    runs-on: ubuntu-latest
    steps:
      - name: Print promotion command
        env:
          SERVICE_NAME: ${{ inputs.service-name }}
          IMAGE_TAG: ${{ needs.version.outputs.tag }}
          IMAGE_DIGEST: ${{ needs.build-sign.outputs.digest }}
        run: |
          {
            echo "## ${SERVICE_NAME} ${IMAGE_TAG} staged"
            echo ""
            echo "Image digest: \`${IMAGE_DIGEST}\`"
            echo ""
            echo "Promote to production with:"
            echo '```'
            echo "gh workflow run promote.yaml \\"
            echo "  -f image_tag=${IMAGE_TAG} \\"
            echo "  -f image_digest=${IMAGE_DIGEST}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
